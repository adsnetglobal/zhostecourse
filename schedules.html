<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jadwal Kelas Offline</title>
  <link rel="stylesheet" href="tailwind.css" />
  <script src="site.config.js"></script>
  <script src="config.js"></script>
</head>
<body class="bg-slate-50 text-slate-800">
  <header class="bg-white border-b border-slate-200">
    <nav class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="index.html" class="font-black text-indigo-600">WEB KURSUS OFFLINE</a>
      <div class="flex gap-4 text-sm font-semibold"><a href="courses.html">Kursus</a><a href="schedules.html" class="text-indigo-600">Jadwal</a></div>
    </nav>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-8">
    <h1 class="text-3xl font-black mb-2">Jadwal Kelas Tatap Muka</h1>
    <p class="text-slate-500 mb-6">Filter jadwal berdasarkan kategori, level, dan mode kelas.</p>

    <form id="filters" class="grid md:grid-cols-4 gap-3 mb-5">
      <input id="category" class="rounded-xl border border-slate-200 px-3 py-2" placeholder="Kategori" />
      <input id="level" class="rounded-xl border border-slate-200 px-3 py-2" placeholder="Level" />
      <select id="mode" class="rounded-xl border border-slate-200 px-3 py-2"><option value="">Semua mode</option><option value="weekday">Weekday</option><option value="weekend">Weekend</option></select>
      <select id="seat" class="rounded-xl border border-slate-200 px-3 py-2"><option value="">Semua kursi</option><option value="true">Tersedia</option></select>
    </form>

    <div class="overflow-auto bg-white border border-slate-200 rounded-2xl">
      <table class="min-w-full text-sm">
        <thead class="bg-slate-100 text-slate-500 uppercase text-xs"><tr><th class="px-4 py-3 text-left">Program</th><th class="px-4 py-3 text-left">Batch</th><th class="px-4 py-3 text-left">Hari/Jam</th><th class="px-4 py-3 text-left">Kursi</th><th class="px-4 py-3 text-left">Status</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </main>

  <script>
    const apiUrl = window.API_URL || window.SCRIPT_URL || '/api';
    const esc = (v) => String(v || '').replace(/[&<>"]/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    async function api(action, payload = {}) {
      const r = await fetch(apiUrl, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action, ...payload }) });
      return r.json();
    }
    async function loadSchedules() {
      const res = await api('get_schedules_public', {
        category: document.getElementById('category').value,
        level: document.getElementById('level').value,
        mode: document.getElementById('mode').value,
        seat_available: document.getElementById('seat').value
      });
      const rows = document.getElementById('rows');
      const list = res.status === 'success' ? (res.data || []) : [];
      rows.innerHTML = list.map((s) => `
        <tr class="border-t border-slate-100">
          <td class="px-4 py-3">${esc(s.course_name || '-')}</td>
          <td class="px-4 py-3">${esc(s.batch_code || '-')}</td>
          <td class="px-4 py-3">${esc(s.class_days || '-')} • ${esc(s.class_time || '-')}</td>
          <td class="px-4 py-3">${Number(s.available_seats || 0)} / ${Number(s.quota || 0)}</td>
          <td class="px-4 py-3"><span class="font-semibold ${String(s.status).includes('open') ? 'text-emerald-600' : 'text-amber-600'}">${esc(s.status || '-')}</span></td>
        </tr>
      `).join('') || '<tr><td colspan="5" class="px-4 py-8 text-center text-slate-400">Belum ada jadwal tersedia.</td></tr>';
    }
    document.getElementById('filters').addEventListener('input', loadSchedules);
    document.getElementById('filters').addEventListener('change', loadSchedules);
    loadSchedules();
  </script>
</body>
</html>
