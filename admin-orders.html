<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Registrasi - Admin Area</title>
    <!-- Config -->
    <script src="site.config.js"></script>
    <script src="config.js?v=2026_2"></script>
    <!-- Tailwind CSS -->
    <link rel="preload" as="style" href="tailwind.css?v=2026_1">
    <link rel="stylesheet" href="tailwind.css?v=2026_1">
    <!-- SweetAlert2 -->
    <script defer src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .loading-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4f46e5;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    <script>
        (function(){
            // 0. Redirect jika diakses langsung (bukan dari iframe/admin-area)
            if (window.self === window.top) {
                window.location.replace("admin-area.html");
                return;
            }

            // 1. Cek Login Admin Area (Prioritas)
            const role = String(sessionStorage.getItem('auth_role') || '').toLowerCase();
            const isUnifiedAdmin = sessionStorage.getItem('auth_v1') === 'true' && role === 'admin' && !!sessionStorage.getItem('auth_session_token');
            if(isUnifiedAdmin) {
                return; // Akses diterima sebagai Admin Area
            }

            // 2. Cek Login Member Area
            const em = sessionStorage.getItem('user_email');
            if(!em) { window.location.replace('login.html'); return; }
            
            // 3. Validasi Role Admin dari Data Dashboard
            const c = localStorage.getItem('cepat_dashboard_data_' + em);
            let isAdmin = false;
            if(c) {
                try {
                    const d = JSON.parse(c);
                    if(d.user && d.user.role === 'admin') isAdmin = true;
                } catch(e) {}
            }
            
            if(!isAdmin) {
                alert('Akses Ditolak: Hanya Admin yang diizinkan mengakses halaman ini.');
                window.location.replace('dashboard.html');
            }
        })();
    </script>

    <!-- Loading Overlay -->
    <div id="loading" class="loading-overlay">
        <div class="spinner"></div>
    </div>

    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-10" id="main-header">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <h1 class="text-xl font-bold text-indigo-600 flex items-center gap-2">
                <i class="fa-solid fa-user-graduate"></i> Data Registrasi
            </h1>
            <div class="flex items-center gap-3">
                <button type="button" onclick="window.close()" class="text-gray-500 hover:text-gray-700 text-sm">
                    <i class="fa-solid fa-times"></i> Tutup
                </button>
            </div>
        </div>
    </header>

    <script>
        // Hide header if inside iframe (integrated mode)
        if (window.self !== window.top) {
            document.getElementById('main-header').style.display = 'none';
            document.body.classList.remove('bg-gray-50');
            document.body.classList.add('bg-white');
        }
    </script>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Toolbar -->
        <div class="bg-white p-4 rounded-lg shadow-sm mb-6 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex gap-2 w-full sm:w-auto">
                <div class="relative w-full sm:w-64">
                    <input type="text" id="searchInput" placeholder="Cari Kode, Email, atau Nama..." 
                           class="w-full pl-10 pr-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none text-sm">
                    <i class="fa-solid fa-search absolute left-3 top-2.5 text-gray-400"></i>
                </div>
                <button type="button" onclick="fetchOrders(1)" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-lg text-sm">
                    <i class="fa-solid fa-sync"></i>
                </button>
            </div>
            
            <button type="button" id="btn-add-order" onclick="openModal('create')" class="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg shadow transition text-sm flex items-center justify-center gap-2">
                <i class="fa-solid fa-plus"></i> Tambah Lead
            </button>
        </div>

        <!-- Table Container -->
        <div class="bg-white rounded-lg shadow overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Kode</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Tanggal</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Peserta</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Program/Jadwal</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Lead Source</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                            <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTableBody" class="bg-white divide-y divide-gray-200">
                        <!-- Data will be injected here -->
                    </tbody>
                </table>
            </div>
            
            <!-- Pagination -->
            <div class="bg-gray-50 px-4 py-3 flex items-center justify-between border-t border-gray-200 sm:px-6">
                <div class="hidden sm:flex-1 sm:flex sm:items-center sm:justify-between">
                    <div>
                        <p class="text-sm text-gray-700">
                            Menampilkan <span class="font-medium" id="pageStart">0</span> sampai <span class="font-medium" id="pageEnd">0</span>
                        </p>
                    </div>
                    <div>
                        <nav class="relative z-0 inline-flex rounded-md shadow-sm -space-x-px" aria-label="Pagination">
                            <button type="button" id="prevBtn" onclick="changePage(-1)" class="relative inline-flex items-center px-2 py-2 rounded-l-md border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50">
                                <span class="sr-only">Previous</span>
                                <i class="fa-solid fa-chevron-left h-5 w-5"></i>
                            </button>
                            <span id="pageInfo" class="relative inline-flex items-center px-4 py-2 border border-gray-300 bg-white text-sm font-medium text-gray-700">
                                Page 1
                            </span>
                            <button type="button" id="nextBtn" onclick="changePage(1)" class="relative inline-flex items-center px-2 py-2 rounded-r-md border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50">
                                <span class="sr-only">Next</span>
                                <i class="fa-solid fa-chevron-right h-5 w-5"></i>
                            </button>
                        </nav>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- Modal Form -->
    <div id="orderModal" class="fixed inset-0 z-50 hidden overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" aria-hidden="true" onclick="closeModal()"></div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
            <div class="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg w-full">
                <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                    <div class="sm:flex sm:items-start">
                        <div class="mt-3 text-center sm:mt-0 sm:ml-4 sm:text-left w-full">
                            <h3 class="text-lg leading-6 font-medium text-gray-900" id="modalTitle">Tambah Registrasi Baru</h3>
                            <div class="mt-4 space-y-4">
                                <input type="hidden" id="orderId">
                                
                                <div>
                                    <label class="block text-sm font-medium text-gray-700">Nama Pelanggan</label>
                                    <input type="text" id="inputNama" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                                </div>
                                
                                <div>
                                    <label class="block text-sm font-medium text-gray-700">Email</label>
                                    <input type="email" id="inputEmail" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                                </div>

                                <div>
                                    <label class="block text-sm font-medium text-gray-700">WhatsApp</label>
                                    <input type="text" id="inputWa" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" placeholder="628xxx">
                                </div>

                                <div class="grid grid-cols-2 gap-4">
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700">ID Program</label>
                                        <input type="text" id="inputIdProduk" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700">Jadwal Kelas</label>
                                        <input type="text" id="inputNamaProduk" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                                    </div>
                                </div>

                                <div>
                                    <label class="block text-sm font-medium text-gray-700">Sumber Informasi</label>
                                    <input type="text" id="inputHarga" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" placeholder="Contoh: instagram">
                                </div>

                                <div>
                                    <label class="block text-sm font-medium text-gray-700">Status</label>
                                    <select id="inputStatus" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                                        <option value="new">new</option>
                                        <option value="contacted">contacted</option>
                                        <option value="follow_up">follow_up</option>
                                        <option value="confirmed">confirmed</option>
                                        <option value="paid">paid</option>
                                        <option value="enrolled">enrolled</option>
                                        <option value="cancelled">cancelled</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
                    <button id="btn-save-order" type="button" onclick="saveOrder()" class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-indigo-600 text-base font-medium text-white hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 sm:ml-3 sm:w-auto sm:text-sm">
                        Simpan
                    </button>
                    <button type="button" onclick="closeModal()" class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm">
                        Batal
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURATION — Dynamic lookup from encrypted config.js
        function getApiUrl() {
            return window.SCRIPT_URL || (typeof SCRIPT_URL !== 'undefined' ? SCRIPT_URL : null);
        }
        let currentPage = 1;
        let currentData = [];
        let isEditing = false;

        function ensureAdminSessionActive() {
            const token = String(sessionStorage.getItem('auth_session_token') || '');
            const role = String(sessionStorage.getItem('auth_role') || '').toLowerCase();
            const hasUnifiedSession = sessionStorage.getItem('auth_v1') === 'true' && role === 'admin' && !!token;
            if (!hasUnifiedSession) {
                Swal.fire('Sesi Tidak Valid', 'Sesi admin tidak valid. Silakan login ulang.', 'warning')
                    .then(() => window.top.location.replace('admin-area.html'));
                return false;
            }
            return true;
        }

        function buildAdminAuthPayload(payload) {
            if (!ensureAdminSessionActive()) throw new Error('Sesi admin tidak valid.');
            return Object.assign({}, payload || {}, {
                auth_session_token: sessionStorage.getItem('auth_session_token') || '',
                auth_role: sessionStorage.getItem('auth_role') || ''
            });
        }

        // ON LOAD
        document.addEventListener('DOMContentLoaded', () => {
            fetchOrders(1);
            
            // Search debounce
            let timeout = null;
            document.getElementById('searchInput').addEventListener('keyup', function(e) {
                clearTimeout(timeout);
                timeout = setTimeout(() => {
                    fetchOrders(1, e.target.value);
                }, 500);
            });
        });

        // LOADING STATE
        function setLoading(active) {
            const el = document.getElementById('loading');
            if (active) el.classList.add('active');
            else el.classList.remove('active');
        }

        // FETCH ORDERS (READ)
        async function fetchOrders(page, search = "") {
            const API_URL = getApiUrl();
            if (!API_URL) {
                console.error('[Config] SCRIPT_URL tidak tersedia');
                Swal.fire('Error', 'Konfigurasi API belum siap. Pastikan config.js termuat. Coba refresh.', 'error');
                return;
            }
            setLoading(true);
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(buildAdminAuthPayload({
                        action: 'get_admin_registrations_v2'
                    }))
                });
                
                const json = await res.json();
                
                if (json.status === 'success') {
                    const all = Array.isArray(json.data) ? json.data : [];
                    const q = String(search || '').toLowerCase();
                    const filtered = all.filter((item) => {
                      if (!q) return true;
                      const hay = [item.id, item.full_name, item.email, item.course_id, item.schedule_id, item.status].join(' ').toLowerCase();
                      return hay.includes(q);
                    });
                    const limit = 20;
                    const start = (page - 1) * limit;
                    const sliced = filtered.slice(start, start + limit);
                    currentData = filtered;
                    renderTable(sliced);
                    updatePagination(page, (start + limit) < filtered.length, sliced.length);
                    currentPage = page;
                } else {
                    Swal.fire('Error', json.message, 'error');
                }
            } catch (error) {
                console.error(error);
                Swal.fire('Error', 'Gagal memuat data. Cek koneksi.', 'error');
            } finally {
                setLoading(false);
            }
        }

        // RENDER TABLE
        function renderTable(data) {
            const tbody = document.getElementById('ordersTableBody');
            tbody.innerHTML = '';

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="px-6 py-4 text-center text-gray-500">Tidak ada data ditemukan</td></tr>`;
                return;
            }

            data.forEach(item => {
                const inv = item.id || '-';
                const email = item.email || '-';
                const name = item.full_name || '-';
                const pname = `${item.course_id || '-'} / ${item.schedule_id || '-'}`;
                const leadSource = item.lead_source || '-';
                const status = item.status || 'new';
                const date = item.created_at ? new Date(item.created_at).toLocaleDateString('id-ID') : '-';
                
                let statusClass = 'bg-gray-100 text-gray-800';
                if (['confirmed','paid','enrolled'].includes(String(status))) statusClass = 'bg-green-100 text-green-800';
                if (['new','follow_up'].includes(String(status))) statusClass = 'bg-yellow-100 text-yellow-800';
                if (String(status) === 'cancelled') statusClass = 'bg-red-100 text-red-800';

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-indigo-600">${inv}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${date}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">
                        <div class="font-bold">${name}</div>
                        <div class="text-xs text-gray-500">${email}</div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${pname}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${leadSource}</td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${statusClass}">
                            ${status}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                        <button onclick="editOrder('${inv}')" class="text-indigo-600 hover:text-indigo-900 mr-3"><i class="fa-solid fa-edit"></i></button>
                        <button onclick="deleteOrder('${inv}')" class="text-red-600 hover:text-red-900"><i class="fa-solid fa-trash"></i></button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // PAGINATION
        function updatePagination(page, hasMore, count = 0) {
            // Update Text X sampai Y
            const limit = 20;
            const start = count > 0 ? (page - 1) * limit + 1 : 0;
            const end = count > 0 ? (page - 1) * limit + count : 0;
            
            const pStart = document.getElementById('pageStart');
            const pEnd = document.getElementById('pageEnd');
            if(pStart) pStart.innerText = start;
            if(pEnd) pEnd.innerText = end;

            document.getElementById('pageInfo').innerText = `Halaman ${page}`;
            document.getElementById('prevBtn').disabled = page === 1;
            document.getElementById('nextBtn').disabled = !hasMore;
            
            // Simple visual feedback
            if (page === 1) document.getElementById('prevBtn').classList.add('opacity-50', 'cursor-not-allowed');
            else document.getElementById('prevBtn').classList.remove('opacity-50', 'cursor-not-allowed');
            
            if (!hasMore) document.getElementById('nextBtn').classList.add('opacity-50', 'cursor-not-allowed');
            else document.getElementById('nextBtn').classList.remove('opacity-50', 'cursor-not-allowed');
        }

        function changePage(delta) {
            const newPage = currentPage + delta;
            if (newPage < 1) return;
            fetchOrders(newPage);
        }

        // MODAL FUNCTIONS
        function openModal(mode, data = null) {
            const modal = document.getElementById('orderModal');
            const title = document.getElementById('modalTitle');
            
            // Reset Form
            document.getElementById('orderId').value = '';
            document.getElementById('inputNama').value = '';
            document.getElementById('inputEmail').value = '';
            document.getElementById('inputWa').value = '';
            document.getElementById('inputIdProduk').value = '';
            document.getElementById('inputNamaProduk').value = '';
            document.getElementById('inputHarga').value = '';
            document.getElementById('inputStatus').value = 'new';

            if (mode === 'edit' && data) {
                isEditing = true;
                title.innerText = 'Edit Registrasi ' + (data.id || '');
                document.getElementById('orderId').value = data.id || '';
                document.getElementById('inputEmail').value = data.email || '';
                document.getElementById('inputNama').value = data.full_name || '';
                document.getElementById('inputWa').value = data.phone || '';
                document.getElementById('inputIdProduk').value = data.course_id || '';
                document.getElementById('inputNamaProduk').value = data.schedule_id || '';
                document.getElementById('inputHarga').value = data.lead_source || '';
                document.getElementById('inputStatus').value = data.status || 'new';
                
                // Disable ID fields in edit mode
                document.getElementById('inputEmail').readOnly = true;
                document.getElementById('inputIdProduk').readOnly = true;
            } else {
                isEditing = false;
                title.innerText = 'Tambah Registrasi Baru';
                document.getElementById('inputEmail').readOnly = false;
                document.getElementById('inputIdProduk').readOnly = false;
            }
            
            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('orderModal').classList.add('hidden');
        }

        // CRUD ACTIONS
        function editOrder(inv) {
            const item = currentData.find(d => String(d.id || '') === String(inv));
            if (item) openModal('edit', item);
        }

        async function saveOrder() {
            const payload = {
                action: 'save_admin_registration_v2',
                id: document.getElementById('orderId').value || ('REG-MANUAL-' + Date.now()),
                full_name: document.getElementById('inputNama').value,
                email: document.getElementById('inputEmail').value,
                phone: document.getElementById('inputWa').value,
                course_id: document.getElementById('inputIdProduk').value,
                schedule_id: document.getElementById('inputNamaProduk').value,
                lead_source: document.getElementById('inputHarga').value,
                status: document.getElementById('inputStatus').value,
                updated_at: new Date().toISOString(),
                created_at: isEditing ? undefined : new Date().toISOString()
            };

            // Basic Validation
            if (!payload.full_name || !payload.email || !payload.course_id) {
                Swal.fire('Validasi', 'Mohon lengkapi data wajib (Nama, Email, ID Program)', 'warning');
                return;
            }

            setLoading(true);
            try {
                const res = await fetch(getApiUrl(), {
                    method: 'POST',
                    body: JSON.stringify(buildAdminAuthPayload(payload))
                });
                const json = await res.json();
                
                if (json.status === 'success') {
                    Swal.fire('Sukses', isEditing ? 'Registrasi diperbarui' : 'Registrasi berhasil dibuat', 'success');
                    closeModal();
                    fetchOrders(currentPage);
                } else {
                    Swal.fire('Gagal', json.message, 'error');
                }
            } catch (e) {
                Swal.fire('Error', e.toString(), 'error');
            } finally {
                setLoading(false);
            }
        }

        function deleteOrder(inv) {
            Swal.fire({
                title: 'Hapus Registrasi?',
                text: `Anda yakin ingin menghapus kode ${inv}? Tindakan ini tidak bisa dibatalkan.`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: 'Ya, Hapus!'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    setLoading(true);
                    try {
                        const res = await fetch(getApiUrl(), {
                            method: 'POST',
                            body: JSON.stringify(buildAdminAuthPayload({
                                action: 'delete_admin_registration_v2',
                                id: inv
                            }))
                        });
                        const json = await res.json();
                        if (json.status === 'success') {
                            Swal.fire('Terhapus!', 'Data registrasi telah dihapus.', 'success');
                            fetchOrders(currentPage);
                        } else {
                            Swal.fire('Gagal', json.message, 'error');
                        }
                    } catch (e) {
                        Swal.fire('Error', e.toString(), 'error');
                    } finally {
                        setLoading(false);
                    }
                }
            });
        }
    </script>
</body>
</html>
