<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Instruktur Kursus Offline</title>
  <link rel="stylesheet" href="tailwind.css" />
  <script src="site.config.js"></script>
  <script src="config.js"></script>
</head>
<body class="bg-slate-50 text-slate-800">
  <header class="bg-white border-b border-slate-200"><nav class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between"><a href="index.html" class="font-black text-indigo-600">WEB KURSUS OFFLINE</a><a href="courses.html" class="text-sm font-semibold">Katalog Kursus</a></nav></header>
  <main class="max-w-6xl mx-auto px-4 py-8">
    <h1 class="text-3xl font-black mb-2">Instruktur Profesional</h1>
    <p class="text-slate-500 mb-6">Pengajar berpengalaman industri dan berorientasi hasil.</p>
    <div id="grid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-5"></div>
  </main>
  <script>
    const apiUrl = window.API_URL || window.SCRIPT_URL || '/api';
    const esc = (v) => String(v || '').replace(/[&<>"]/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    fetch(apiUrl, { method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body: JSON.stringify({ action:'get_instructors_public' }) })
      .then((r) => r.json())
      .then((res) => {
        const list = res.status === 'success' ? (res.data || []) : [];
        const grid = document.getElementById('grid');
        grid.innerHTML = list.map((i) => `
          <article class="bg-white border border-slate-200 rounded-2xl p-5">
            <div class="w-14 h-14 rounded-full bg-indigo-100 text-indigo-600 font-black flex items-center justify-center">${esc((i.full_name || 'I').charAt(0))}</div>
            <h2 class="font-bold text-lg mt-3">${esc(i.full_name)}</h2>
            <p class="text-sm text-indigo-600 font-semibold">${esc(i.specialization || '-')}</p>
            <p class="text-sm text-slate-500 mt-2">Pengalaman: ${Number(i.experience_years || 0)} tahun</p>
            <p class="text-sm text-slate-600 mt-2">${esc(i.bio || '-')}</p>
          </article>
        `).join('') || '<p class="text-slate-400">Data instruktur belum tersedia.</p>';
      });
  </script>
</body>
</html>
