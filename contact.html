<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kontak & Konsultasi Program</title>
  <link rel="stylesheet" href="tailwind.css" />
  <script src="site.config.js"></script>
  <script src="config.js"></script>
</head>
<body class="bg-slate-50 text-slate-800">
  <header class="bg-white border-b border-slate-200"><nav class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between"><a href="index.html" class="font-black text-indigo-600">WEB KURSUS OFFLINE</a><a href="schedules.html" class="text-sm font-semibold">Lihat Jadwal</a></nav></header>
  <main class="max-w-6xl mx-auto px-4 py-8 grid lg:grid-cols-2 gap-6">
    <section class="bg-white border border-slate-200 rounded-2xl p-6">
      <h1 class="text-2xl font-black">Konsultasi Program</h1>
      <p class="text-slate-500 mt-2">Isi form berikut, tim kami akan menghubungi Anda.</p>
      <form id="contact-form" class="mt-5 space-y-3">
        <input id="name" class="w-full rounded-xl border border-slate-200 px-3 py-2" placeholder="Nama lengkap" required />
        <input id="email" type="email" class="w-full rounded-xl border border-slate-200 px-3 py-2" placeholder="Email" required />
        <input id="wa" class="w-full rounded-xl border border-slate-200 px-3 py-2" placeholder="No. WhatsApp" required />
        <textarea id="msg" class="w-full rounded-xl border border-slate-200 px-3 py-2" rows="4" placeholder="Kebutuhan kelas / pertanyaan"></textarea>
        <button type="submit" class="w-full rounded-xl bg-indigo-600 text-white py-3 font-bold">Kirim Pertanyaan</button>
      </form>
      <p id="status" class="mt-3 text-sm"></p>
    </section>
    <section class="bg-white border border-slate-200 rounded-2xl p-6">
      <h2 class="text-xl font-bold">Daftar Cabang</h2>
      <ul id="branches" class="mt-4 space-y-3 text-sm"></ul>
    </section>
  </main>
  <script>
    const apiUrl = window.API_URL || window.SCRIPT_URL || '/api';
    const esc = (v) => String(v || '').replace(/[&<>"]/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    async function api(action, payload = {}) {
      const r = await fetch(apiUrl, { method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body: JSON.stringify({ action, ...payload }) });
      return r.json();
    }
    api('get_branches_public').then((res) => {
      const list = res.status === 'success' ? (res.data || []) : [];
      document.getElementById('branches').innerHTML = list.map((b) => `<li class="border border-slate-200 rounded-xl p-3"><p class="font-bold">${esc(b.name)}</p><p class="text-slate-500">${esc(b.address || b.city || '-')}</p><p>${esc(b.phone || '-')}</p></li>`).join('') || '<li class="text-slate-400">Data cabang belum tersedia.</li>';
    });
    document.getElementById('contact-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const res = await api('create_inquiry', {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        whatsapp: document.getElementById('wa').value,
        message: document.getElementById('msg').value,
        source: 'contact-page'
      });
      const status = document.getElementById('status');
      if (res.status === 'success') {
        status.className = 'mt-3 text-sm text-emerald-600';
        status.textContent = 'Pertanyaan berhasil dikirim. Tim kami segera menghubungi Anda.';
        e.target.reset();
      } else {
        status.className = 'mt-3 text-sm text-red-600';
        status.textContent = res.message || 'Gagal mengirim pertanyaan.';
      }
    });
  </script>
</body>
</html>
