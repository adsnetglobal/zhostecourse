<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Galeri Fasilitas & Aktivitas</title>
  <link rel="stylesheet" href="tailwind.css" />
  <script src="site.config.js"></script>
  <script src="config.js"></script>
</head>
<body class="bg-slate-50 text-slate-800">
  <header class="bg-white border-b border-slate-200"><nav class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between"><a href="index.html" class="font-black text-indigo-600">WEB KURSUS OFFLINE</a><a href="contact.html" class="text-sm font-semibold">Hubungi Kami</a></nav></header>
  <main class="max-w-6xl mx-auto px-4 py-8">
    <h1 class="text-3xl font-black mb-2">Galeri Kelas & Fasilitas</h1>
    <p class="text-slate-500 mb-6">Dokumentasi aktivitas pelatihan, workshop, dan fasilitas belajar.</p>
    <div id="grid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
  </main>
  <script>
    const apiUrl = window.API_URL || window.SCRIPT_URL || '/api';
    const esc = (v) => String(v || '').replace(/[&<>"]/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    fetch(apiUrl, { method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body: JSON.stringify({ action:'get_galleries_public' }) })
      .then((r) => r.json())
      .then((res) => {
        const list = res.status === 'success' ? (res.data || []) : [];
        const grid = document.getElementById('grid');
        grid.innerHTML = list.map((g) => `
          <figure class="bg-white border border-slate-200 rounded-2xl overflow-hidden">
            <img src="${esc(g.media_url || '')}" alt="${esc(g.title || 'Galeri kelas')}" class="w-full h-48 object-cover" />
            <figcaption class="p-3">
              <p class="text-[11px] uppercase tracking-wider text-indigo-600 font-bold">${esc(g.category || 'general')}</p>
              <p class="font-semibold mt-1">${esc(g.title || '')}</p>
            </figcaption>
          </figure>
        `).join('') || '<p class="text-slate-400">Belum ada item galeri.</p>';
      });
  </script>
</body>
</html>
